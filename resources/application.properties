# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/zon?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.charSet=utf8
# 文件上传配置
file.upload-dir=uploads/
spring.servlet.multipart.enabled=true
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:${file.upload-dir}
# 允许上传PMX，fbx文件
spring.servlet.multipart.max-file-size=800MB
spring.servlet.multipart.max-request-size=800MB

# 日志配置
logging.level.com.zom=DEBUG
logging.level.org.springframework.web=INFO

# 服务器配置
server.port=8091
server.servlet.context-path=/