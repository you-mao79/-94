<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .welcome-section {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 15px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #4facfe;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin: 10px 0;
            color: #333;
        }

        .recent-activities {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .activity-list {
            margin-top: 20px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .activity-icon i {
            color: #4facfe;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .action-btn {
            background: white;
            border: 2px solid #4facfe;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #4facfe;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #4facfe;
            color: white;
            transform: translateY(-3px);
        }

        .action-btn i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* 用户下拉菜单样式 */
        .user-dropdown-content.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="main-nav">
    <div class="nav-brand">
        <img src="/images/tubiao.png" alt="品牌图标"
             style="width: 95px; height: 55px; margin-right: 10px; vertical-align: middle;"> 角色管理系统
    </div>

    <div class="nav-links">
        <a href="home.html" class="nav-btn active" id="nav-home">
            <i class="bi bi-house"></i> <span>首页</span>
        </a>
        <a href="model-library.html" class="nav-btn" id="nav-library">
            <i class="bi bi-collection"></i> <span>模型库</span>
        </a>
        <a href="strategy-center.html" class="nav-btn" id="nav-strategy">
            <i class="bi bi-journal-text"></i> <span>攻略中心</span>
        </a>
        <!-- 用户菜单 -->
        <div class="user-dropdown">
            <button class="user-btn" id="user-dropdown-btn">
                <img src="/images/" class="user-avatar" id="user-avatar-img"
                     onerror="this.src='/images/default-avatar.jpg'" alt="用户头像">
                <span class="user-name">绮哟哟</span>
                <i class="bi bi-chevron-down"></i>
            </button>
            <div class="user-dropdown-content" id="userDropdown">
                <div class="user-info">
                    <img src="/images/" class="user-avatar-large" id="user-avatar-large"
                         onerror="this.src='/images/default-avatar.jpg'">
                    <div class="user-details">
                        <h4>绮哟哟</h4>
                        <p>UID: G213323441</p>
                        <span class="user-level">Lv.60</span>
                    </div>
                </div>
                <div class="user-menu">
                    <a href="personal-center.html" class="user-menu-item">
                        <i class="bi bi-person"></i> 个人中心
                    </a>
                    <a href="#" class="user-menu-item">
                        <i class="bi bi-gear"></i> 账号设置
                    </a>
                    <a href="#" class="user-menu-item">
                        <i class="bi bi-bookmark-heart"></i> 我的收藏
                    </a>
                    <div class="divider"></div>
                    <button class="logout-btn" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> 退出登录
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- 首页内容 -->
<div class="dashboard">
    <div class="welcome-section">
        <h1>欢迎回来，绮哟哟！</h1>
        <p>UID: G213323441 | 等级: Lv.60 | 上次登录: 刚刚</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="bi bi-people-fill"></i>
            <h3 id="role-count">3</h3>
            <p>角色数量</p>
        </div>

        <div class="stat-card">
            <i class="bi bi-collection-fill"></i>
            <h3 id="model-count">2</h3>
            <p>模型数量</p>
        </div>

        <div class="stat-card">
            <i class="bi bi-star-fill"></i>
            <h3 id="collection-count">5</h3>
            <p>收藏攻略</p>
        </div>

        <div class="stat-card">
            <i class="bi bi-clock-history"></i>
            <h3 id="activity-count">12</h3>
            <p>本周活动</p>
        </div>
    </div>

    <div class="recent-activities">
        <h2>最近动态</h2>
        <div class="activity-list">
            <div class="activity-item">
                <div class="activity-icon">
                    <i class="bi bi-person-plus"></i>
                </div>
                <div>
                    <p>新增了角色 <strong>「斯卡」</strong></p>
                    <small>2小时前</small>
                </div>
            </div>

            <div class="activity-item">
                <div class="activity-icon">
                    <i class="bi bi-upload"></i>
                </div>
                <div>
                    <p>上传了PMX模型文件</p>
                    <small>3小时前</small>
                </div>
            </div>

            <div class="activity-item">
                <div class="activity-icon">
                    <i class="bi bi-heart-fill"></i>
                </div>
                <div>
                    <p>收藏了 <strong>「渲染材质」</strong> 的攻略</p>
                    <small>1天前</small>
                </div>
            </div>
        </div>
    </div>

    <div class="quick-actions">
        <a href="model-library.html" class="action-btn">
            <i class="bi bi-collection-fill"></i>
            <h3>模型库</h3>
            <p>浏览和上传3D模型</p>
        </a>

        <a href="strategy-center.html" class="action-btn">
            <i class="bi bi-journal-text"></i>
            <h3>攻略中心</h3>
            <p>查看角色攻略</p>
        </a>

        <a href="#" class="action-btn" onclick="alert('请前往模型库页面上传模型')">
            <i class="bi bi-upload"></i>
            <h3>上传模型</h3>
            <p>上传新的3D模型</p>
        </a>
    </div>
</div>

<script>
    // 全局函数处理用户下拉菜单
    function toggleUserDropdown() {
        const dropdown = document.getElementById('userDropdown');
        if (dropdown) {
            dropdown.classList.toggle('show');
        }
    }

    // 点击外部关闭
    document.addEventListener('click', function(event) {
        const dropdown = document.getElementById('userDropdown');
        const userBtn = document.getElementById('user-dropdown-btn');

        if (dropdown && userBtn && !userBtn.contains(event.target) && !dropdown.contains(event.target)) {
            dropdown.classList.remove('show');
        }
    });

    // 登出功能
    function logout() {
        if (confirm('确定要退出登录吗？')) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }
    // 监听头像更新事件
    window.addEventListener('userAvatarUpdated', function(event) {
        console.log('攻略中心：收到头像更新事件', event.detail);

        if (event.detail && event.detail.avatarUrl) {
            // 更新导航栏头像
            const avatarImg = document.querySelector('.user-avatar');
            const avatarLargeImg = document.querySelector('.user-avatar-large');

            if (avatarImg) {
                // 添加时间戳避免缓存
                const newUrl = event.detail.avatarUrl + (event.detail.avatarUrl.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                avatarImg.src = newUrl;
                console.log('更新导航栏头像:', newUrl);
            }

            if (avatarLargeImg) {
                // 添加时间戳避免缓存
                const newUrl = event.detail.avatarUrl + (event.detail.avatarUrl.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                avatarLargeImg.src = newUrl;
                console.log('更新下拉菜单大头像:', newUrl);
            }

            // 保存到本地存储
            localStorage.setItem('userAvatar', event.detail.avatarUrl);
        }
    });

    // 页面加载时设置头像
    document.addEventListener('DOMContentLoaded', function() {
        // 从本地存储获取头像
        const savedAvatar = localStorage.getItem('userAvatar');
        if (savedAvatar) {
            const avatarImg = document.querySelector('.user-avatar');
            const avatarLargeImg = document.querySelector('.user-avatar-large');

            if (avatarImg) {
                // 添加时间戳避免缓存
                avatarImg.src = savedAvatar + (savedAvatar.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
            }

            if (avatarLargeImg) {
                // 添加时间戳避免缓存
                avatarLargeImg.src = savedAvatar + (savedAvatar.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
            }
        }

        // 监听个人资料更新事件
        window.addEventListener('userProfileUpdated', function(event) {
            if (event.detail && event.detail.username) {
                const userNameElement = document.querySelector('.user-name');
                if (userNameElement) {
                    userNameElement.textContent = event.detail.username;
                }
            }
        });
    });

    // 为导航栏按钮绑定点击事件
    document.addEventListener('DOMContentLoaded', function() {
        const userBtn = document.getElementById('user-dropdown-btn');
        if (userBtn) {
            userBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleUserDropdown();
            });
        }
    });
</script>
</body>
</html>
